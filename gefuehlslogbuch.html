<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gefühlslogbuch</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,400..500&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg-deep: #1B2238;
    --bg-card: #242C4A;
    --bg-card-soft: #2C355A;
    --ink: #EDEAE3;
    --ink-soft: #ACB0C8;
    --ink-faint: #767C9C;
    --accent: #5FA8A0;
    --accent-dark: #3D7E77;
    --radius-lg: 22px;
    --radius-md: 14px;
    --radius-sm: 9px;
    --serif: 'Fraunces', Georgia, serif;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg-deep);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: 100vh;
    padding: clamp(20px, 5vw, 56px) 18px 64px;
  }

  .wrap {
    max-width: 600px;
    margin: 0 auto;
  }

  /* ---------- Header / Sky ---------- */
  .sky {
    position: relative;
    height: 168px;
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: #161B30;
    margin-bottom: 28px;
  }

  .blob {
    position: absolute;
    inset: -20%;
    opacity: 0;
    transition: opacity 1.1s ease;
  }
  @media (prefers-reduced-motion: reduce) {
    .blob { transition: opacity 0.2s linear; }
  }
  .blob.active { opacity: 1; }

  .sky-content {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 18px 22px;
  }

  .sky-date {
    font-family: var(--serif);
    font-size: 1.5rem;
    font-weight: 500;
    letter-spacing: 0.2px;
  }

  .sky-sub {
    font-size: 0.85rem;
    color: rgba(237,234,227,0.78);
    margin-top: 2px;
  }

  /* ---------- Cards ---------- */
  .card {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: 22px;
    margin-bottom: 18px;
  }

  h2.section-title {
    font-family: var(--serif);
    font-size: 1.05rem;
    font-weight: 500;
    margin: 0 0 14px;
    color: var(--ink);
  }

  label.field-label {
    display: block;
    font-size: 0.82rem;
    color: var(--ink-soft);
    margin-bottom: 10px;
  }

  /* ---------- Mood picker ---------- */
  .moods {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 22px;
  }

  .mood-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 8px 14px 8px 10px;
    border-radius: 999px;
    border: 1px solid rgba(237,234,227,0.14);
    background: var(--bg-card-soft);
    color: var(--ink-soft);
    font-family: var(--sans);
    font-size: 0.85rem;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .mood-btn:hover { color: var(--ink); }
  .mood-btn:focus-visible {
    outline: 2px solid var(--ink);
    outline-offset: 2px;
  }
  .mood-dot {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .mood-btn.selected {
    border-color: var(--mood-color);
    background: var(--bg-card-soft);
    color: var(--ink);
    box-shadow: 0 0 0 1px var(--mood-color) inset;
  }

  /* ---------- Intensity ---------- */
  .intensity-row {
    margin-bottom: 22px;
  }
  input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
    margin-top: 6px;
  }
  .intensity-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.72rem;
    color: var(--ink-faint);
    margin-top: 4px;
  }

  /* ---------- Textarea ---------- */
  textarea, input[type="text"] {
    width: 100%;
    background: var(--bg-deep);
    border: 1px solid rgba(237,234,227,0.14);
    border-radius: var(--radius-md);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 0.95rem;
    padding: 13px 14px;
    resize: vertical;
    line-height: 1.5;
  }
  textarea { min-height: 92px; }
  textarea:focus, input[type="text"]:focus {
    outline: none;
    border-color: var(--accent);
  }
  textarea::placeholder, input::placeholder { color: var(--ink-faint); }

  /* ---------- Buttons ---------- */
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  button.primary, button.ghost {
    font-family: var(--sans);
    font-weight: 500;
    font-size: 0.88rem;
    padding: 10px 18px;
    border-radius: 999px;
    cursor: pointer;
    border: none;
    transition: filter 0.15s, opacity 0.15s;
  }
  button.primary {
    background: var(--accent);
    color: #11151F;
  }
  button.primary:hover { filter: brightness(1.08); }
  button.primary:disabled { opacity: 0.45; cursor: not-allowed; }

  button.ghost {
    background: transparent;
    color: var(--ink-soft);
    border: 1px solid rgba(237,234,227,0.18);
  }
  button.ghost:hover { color: var(--ink); }

  button:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }

  /* ---------- Reflection ---------- */
  .reflection-block {
    margin-top: 18px;
    padding-top: 16px;
    border-top: 1px solid rgba(237,234,227,0.1);
  }
  .reflection-turn { margin-bottom: 12px; }
  .reflection-turn .who {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-faint);
    margin-bottom: 4px;
  }
  .reflection-turn.assistant p {
    font-family: var(--serif);
    font-style: italic;
    font-size: 1.02rem;
    line-height: 1.55;
    color: var(--ink);
    margin: 0;
  }
  .reflection-turn.user p {
    font-family: var(--sans);
    font-size: 0.92rem;
    color: var(--ink-soft);
    margin: 0;
  }
  .thinking {
    font-family: var(--serif);
    font-style: italic;
    color: var(--ink-faint);
    font-size: 0.95rem;
  }
  .error-msg {
    font-size: 0.85rem;
    color: #E29A8A;
    margin-top: 8px;
  }
  .saved-msg {
    font-size: 0.85rem;
    color: var(--accent);
    margin-top: 10px;
  }
  .round-note {
    font-size: 0.78rem;
    color: var(--ink-faint);
    margin-top: 4px;
  }

  /* ---------- Weather strip ---------- */
  .strip {
    display: flex;
    align-items: flex-end;
    gap: 5px;
    overflow-x: auto;
    padding: 4px 2px 10px;
    margin-bottom: 6px;
  }
  .strip-bar {
    flex-shrink: 0;
    width: 10px;
    border-radius: 4px;
    cursor: pointer;
    opacity: 0.85;
    transition: opacity 0.15s, transform 0.15s;
  }
  .strip-bar:hover { opacity: 1; transform: translateY(-2px); }

  .empty-state {
    font-size: 0.88rem;
    color: var(--ink-faint);
    line-height: 1.5;
  }

  /* ---------- Entries list ---------- */
  .entry {
    border-radius: var(--radius-md);
    background: var(--bg-card-soft);
    padding: 16px 18px;
    margin-bottom: 10px;
  }
  .entry-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 8px;
  }
  .entry-mood {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.84rem;
    color: var(--ink-soft);
  }
  .entry-date {
    font-size: 0.78rem;
    color: var(--ink-faint);
  }
  .entry-text {
    font-size: 0.92rem;
    color: var(--ink);
    line-height: 1.5;
    margin: 0 0 4px;
  }
  .toggle-link {
    font-size: 0.78rem;
    color: var(--ink-faint);
    text-decoration: underline;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    margin-top: 6px;
  }
  .entry-reflection { display: none; margin-top: 10px; }
  .entry-reflection.open { display: block; }

  footer.note {
    font-size: 0.76rem;
    color: var(--ink-faint);
    text-align: center;
    line-height: 1.5;
    margin-top: 30px;
    padding: 0 10px;
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="sky" id="sky">
    <div class="blob" id="blob-freude" style="background: radial-gradient(circle at 28% 30%, #E8A33D, #161B30 75%);"></div>
    <div class="blob" id="blob-ruhe" style="background: radial-gradient(circle at 28% 30%, #5FA8A0, #161B30 75%);"></div>
    <div class="blob" id="blob-traurigkeit" style="background: radial-gradient(circle at 28% 30%, #6B7FE0, #161B30 75%);"></div>
    <div class="blob" id="blob-wut" style="background: radial-gradient(circle at 28% 30%, #C1604A, #161B30 75%);"></div>
    <div class="blob" id="blob-anspannung" style="background: radial-gradient(circle at 28% 30%, #9A86C9, #161B30 75%);"></div>
    <div class="blob" id="blob-leere" style="background: radial-gradient(circle at 28% 30%, #9C968A, #161B30 75%);"></div>
    <div class="sky-content">
      <div class="sky-date" id="todayLabel"></div>
      <div class="sky-sub">Wie fühlt sich dein Moment gerade an?</div>
    </div>
  </div>

  <div class="card">
    <h2 class="section-title">Neuer Eintrag</h2>

    <label class="field-label">Wähle das Gefühl, das gerade am stärksten da ist</label>
    <div class="moods" id="moodPicker"></div>

    <div class="intensity-row">
      <label class="field-label">Wie stark ist das Gefühl?</label>
      <input type="range" id="intensity" min="1" max="5" value="3" />
      <div class="intensity-labels"><span>kaum spürbar</span><span>überwältigend</span></div>
    </div>

    <label class="field-label" for="entryText">Was ist passiert? Was geht dir durch den Kopf?</label>
    <textarea id="entryText" placeholder="Schreib einfach los, so wie es kommt …"></textarea>

    <div class="btn-row">
      <button class="primary" id="reflectBtn" disabled>Reflektieren</button>
      <button class="ghost" id="skipBtn" disabled>Ohne Reflexion speichern</button>
    </div>

    <div id="reflectionArea"></div>
  </div>

  <div class="card">
    <h2 class="section-title">Emotionswetter</h2>
    <div class="strip" id="strip"></div>
    <div id="entriesList"></div>
  </div>

  <footer class="note">
    Dieses Logbuch hilft dir, eigene Gefühle besser zu verstehen. Es ersetzt kein Gespräch mit einer Person, der du vertraust, oder mit einer Fachperson.
  </footer>

</div>

<script>
  const STORAGE_KEY = 'emotion-journal-entries';
  const MAX_ROUNDS = 3;

  const MOODS = [
    { key: 'freude',      label: 'Freude',       color: '#E8A33D' },
    { key: 'ruhe',        label: 'Ruhe',         color: '#5FA8A0' },
    { key: 'traurigkeit', label: 'Traurigkeit',  color: '#6B7FE0' },
    { key: 'wut',         label: 'Wut',          color: '#C1604A' },
    { key: 'anspannung',  label: 'Anspannung',   color: '#9A86C9' },
    { key: 'leere',       label: 'Leere',        color: '#9C968A' },
  ];

  const SYSTEM_PROMPT = `Du bist eine ruhige, neugierige Reflexionsbegleitung in einem privaten Gefühlslogbuch.
Die Person beschreibt ein Gefühl. Deine Aufgabe: Stelle GENAU EINE offene, einfühlsame Frage, die ihr hilft,
selbst herauszufinden, was das Gefühl ausgelöst hat oder was dahinter steckt. Keine Diagnosen, keine Ratschläge,
keine Bewertung, keine Floskeln. Antworte in 1-3 kurzen Sätzen, auf Deutsch, in der Du-Form, warm aber nicht kitschig.
Wenn die Beschreibung auf akute Gefahr für die Person oder andere hindeutet (z.B. Selbstverletzung, Suizidgedanken),
reagiere stattdessen einfühlsam und ermutige sie direkt und konkret, sich an eine Vertrauensperson oder eine
Beratungsstelle zu wenden, anstatt weiter zu reflektieren.`;

  let entries = [];
  let selectedMood = null;
  let conversation = []; // {role, content} for current draft
  let round = 0;
  let finished = false;

  const $ = (id) => document.getElementById(id);

  function moodByKey(key) { return MOODS.find(m => m.key === key); }

  function todayLabel() {
    const d = new Date();
    return d.toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' });
  }

  function setSkyMood(key) {
    MOODS.forEach(m => {
      const blob = $('blob-' + m.key);
      if (blob) blob.classList.toggle('active', m.key === key);
    });
  }

  function renderMoodPicker() {
    const el = $('moodPicker');
    el.innerHTML = '';
    MOODS.forEach(m => {
      const btn = document.createElement('button');
      btn.className = 'mood-btn' + (selectedMood === m.key ? ' selected' : '');
      btn.style.setProperty('--mood-color', m.color);
      btn.innerHTML = `<span class="mood-dot" style="background:${m.color}"></span>${m.label}`;
      btn.addEventListener('click', () => {
        selectedMood = m.key;
        setSkyMood(m.key);
        renderMoodPicker();
        updateButtons();
      });
      el.appendChild(btn);
    });
  }

  function updateButtons() {
    const text = $('entryText').value.trim();
    const ready = !!selectedMood && text.length > 0;
    $('reflectBtn').disabled = !ready || finished;
    $('skipBtn').disabled = !ready || finished;
  }

  async function loadEntries() {
    try {
      const result = await window.storage.get(STORAGE_KEY, false);
      if (result && result.value) return JSON.parse(result.value);
      return [];
    } catch (e) {
      return [];
    }
  }

  async function persistEntries() {
    try {
      await window.storage.set(STORAGE_KEY, JSON.stringify(entries), false);
    } catch (e) {
      console.error('Speichern fehlgeschlagen', e);
    }
  }

  function renderStrip() {
    const strip = $('strip');
    if (entries.length === 0) {
      strip.innerHTML = '';
      return;
    }
    strip.innerHTML = '';
    entries.forEach((e, idx) => {
      const mood = moodByKey(e.mood);
      const bar = document.createElement('div');
      bar.className = 'strip-bar';
      const h = 16 + (e.intensity || 3) * 8;
      bar.style.height = h + 'px';
      bar.style.background = mood ? mood.color : '#888';
      bar.title = e.dateLabel + ' · ' + (mood ? mood.label : '');
      bar.addEventListener('click', () => {
        const target = document.getElementById('entry-' + e.id);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
      });
      strip.appendChild(bar);
    });
  }

  function renderEntries() {
    const list = $('entriesList');
    if (entries.length === 0) {
      list.innerHTML = '<p class="empty-state">Noch keine Einträge. Dein erster Eintrag erscheint hier, sobald du ihn speicherst.</p>';
      return;
    }
    list.innerHTML = '';
    [...entries].reverse().forEach(e => {
      const mood = moodByKey(e.mood);
      const card = document.createElement('div');
      card.className = 'entry';
      card.id = 'entry-' + e.id;

      const hasReflection = e.conversation && e.conversation.length > 0;

      card.innerHTML = `
        <div class="entry-head">
          <span class="entry-mood"><span class="mood-dot" style="background:${mood ? mood.color : '#888'}"></span>${mood ? mood.label : ''} · ${e.intensity}/5</span>
          <span class="entry-date">${e.dateLabel}</span>
        </div>
        <p class="entry-text">${escapeHtml(e.text)}</p>
        ${hasReflection ? `<button class="toggle-link" data-id="${e.id}">Reflexion anzeigen</button>
        <div class="entry-reflection" id="refl-${e.id}">
          ${e.conversation.map(turn => `
            <div class="reflection-turn ${turn.role === 'assistant' ? 'assistant' : 'user'}">
              <div class="who">${turn.role === 'assistant' ? 'Frage' : 'Deine Antwort'}</div>
              <p>${escapeHtml(turn.text)}</p>
            </div>
          `).join('')}
        </div>` : ''}
      `;
      list.appendChild(card);
    });

    list.querySelectorAll('.toggle-link').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-id');
        const block = document.getElementById('refl-' + id);
        const open = block.classList.toggle('open');
        btn.textContent = open ? 'Reflexion verbergen' : 'Reflexion anzeigen';
      });
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function renderReflectionArea() {
    const area = $('reflectionArea');
    if (conversation.length === 0) {
      area.innerHTML = '';
      return;
    }
    let html = '<div class="reflection-block" id="convoTurns"></div>';
    area.innerHTML = html;
    const turns = $('convoTurns');
    conversation.forEach(turn => {
      const div = document.createElement('div');
      div.className = 'reflection-turn ' + (turn.role === 'assistant' ? 'assistant' : 'user');
      div.innerHTML = `<div class="who">${turn.role === 'assistant' ? 'Frage' : 'Deine Antwort'}</div><p>${escapeHtml(turn.text)}</p>`;
      turns.appendChild(div);
    });

    if (!finished && round < MAX_ROUNDS) {
      const followUp = document.createElement('div');
      followUp.style.marginTop = '14px';
      followUp.innerHTML = `
        <input type="text" id="followUpInput" placeholder="Deine Antwort …" />
        <div class="btn-row">
          <button class="primary" id="answerBtn">Antworten</button>
          <button class="ghost" id="finishBtn">Eintrag speichern</button>
        </div>
      `;
      area.appendChild(followUp);
      $('answerBtn').addEventListener('click', submitFollowUp);
      $('finishBtn').addEventListener('click', saveEntry);
      $('followUpInput').addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter') submitFollowUp();
      });
    } else if (!finished) {
      const note = document.createElement('div');
      note.className = 'round-note';
      note.textContent = 'Reflexion für diesen Eintrag abgeschlossen.';
      area.appendChild(note);
      const saveWrap = document.createElement('div');
      saveWrap.className = 'btn-row';
      saveWrap.innerHTML = `<button class="primary" id="finishBtn2">Eintrag speichern</button>`;
      area.appendChild(saveWrap);
      document.getElementById('finishBtn2').addEventListener('click', saveEntry);
    }
  }

  function showThinking(show) {
    const area = $('reflectionArea');
    let el = document.getElementById('thinkingNote');
    if (show) {
      if (!el) {
        el = document.createElement('div');
        el.id = 'thinkingNote';
        el.className = 'thinking';
        el.textContent = 'Denkt nach …';
        area.appendChild(el);
      }
    } else if (el) {
      el.remove();
    }
  }

  function showError(msg) {
    const area = $('reflectionArea');
    const el = document.createElement('div');
    el.className = 'error-msg';
    el.textContent = msg;
    area.appendChild(el);
  }

  async function callClaude(messages) {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: messages
      })
    });
    const data = await response.json();
    const text = (data.content || []).map(b => b.text || '').filter(Boolean).join('\n').trim();
    return text;
  }

  async function startReflection() {
    const text = $('entryText').value.trim();
    if (!selectedMood || !text) return;
    const mood = moodByKey(selectedMood);
    const intensity = $('intensity').value;
    conversation = [];
    round = 0;
    finished = false;

    const initialPrompt = `Ich fühle gerade: ${mood.label} (Intensität ${intensity}/5).\n${text}`;
    conversation.push({ role: 'user', text: initialPrompt, hidden: true });
    renderReflectionArea();
    showThinking(true);
    $('reflectBtn').disabled = true;
    $('skipBtn').disabled = true;

    try {
      const apiMessages = conversation.filter(t => true).map(t => ({ role: t.role, content: t.text }));
      const reply = await callClaude(apiMessages);
      showThinking(false);
      if (!reply) throw new Error('leer');
      conversation.push({ role: 'assistant', text: reply });
      round++;
      renderReflectionArea();
    } catch (e) {
      showThinking(false);
      showError('Die Reflexion konnte nicht geladen werden. Versuch es gleich noch mal.');
      $('reflectBtn').disabled = false;
      $('skipBtn').disabled = false;
    }
  }

  async function submitFollowUp() {
    const input = $('followUpInput');
    const val = input.value.trim();
    if (!val) return;
    conversation.push({ role: 'user', text: val });
    renderReflectionArea();
    showThinking(true);

    try {
      const apiMessages = conversation.map(t => ({ role: t.role, content: t.text }));
      const reply = await callClaude(apiMessages);
      showThinking(false);
      if (!reply) throw new Error('leer');
      conversation.push({ role: 'assistant', text: reply });
      round++;
      renderReflectionArea();
    } catch (e) {
      showThinking(false);
      showError('Antwort konnte nicht geladen werden. Versuch es gleich noch mal.');
      renderReflectionArea();
    }
  }

  async function saveEntry() {
    const text = $('entryText').value.trim();
    const intensity = parseInt($('intensity').value, 10);
    const visibleConvo = conversation.filter(t => !t.hidden);
    const entry = {
      id: Date.now().toString(),
      dateLabel: new Date().toLocaleDateString('de-DE', { day: 'numeric', month: 'long', year: 'numeric' }),
      mood: selectedMood,
      intensity: intensity,
      text: text,
      conversation: visibleConvo,
      createdAt: Date.now()
    };
    entries.push(entry);
    await persistEntries();
    resetDraft();
    renderStrip();
    renderEntries();
  }

  async function skipReflectionAndSave() {
    const text = $('entryText').value.trim();
    const intensity = parseInt($('intensity').value, 10);
    if (!selectedMood || !text) return;
    const entry = {
      id: Date.now().toString(),
      dateLabel: new Date().toLocaleDateString('de-DE', { day: 'numeric', month: 'long', year: 'numeric' }),
      mood: selectedMood,
      intensity: intensity,
      text: text,
      conversation: [],
      createdAt: Date.now()
    };
    entries.push(entry);
    await persistEntries();
    resetDraft();
    renderStrip();
    renderEntries();
  }

  function resetDraft() {
    $('entryText').value = '';
    $('intensity').value = 3;
    selectedMood = null;
    conversation = [];
    round = 0;
    finished = false;
    setSkyMood(null);
    renderMoodPicker();
    renderReflectionArea();
    updateButtons();
  }

  async function init() {
    $('todayLabel').textContent = todayLabel();
    renderMoodPicker();
    $('entriesList').innerHTML = '<p class="empty-state">Lade deine Einträge …</p>';

    entries = await loadEntries();
    renderStrip();
    renderEntries();

    $('entryText').addEventListener('input', updateButtons);
    $('reflectBtn').addEventListener('click', startReflection);
    $('skipBtn').addEventListener('click', skipReflectionAndSave);
  }

  init();
</script>
</body>
</html>
