<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gefühlslogbuch – Anmelden</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="page-bubbles" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span><span></span></div>

<div class="wrap">

  <div class="sky">
    <div class="sky-content">
      <div class="sky-date">Gefühlslogbuch</div>
      <div class="sky-sub">Melde dich an, um deine Einträge zu sehen.</div>
    </div>
  </div>

  <div class="card">
    <div class="auth-toggle">
      <button class="ghost active" id="tabLogin" type="button">Anmelden</button>
      <button class="ghost" id="tabRegister" type="button">Registrieren</button>
    </div>

    <h2 class="section-title" id="authTitle">Willkommen zurück</h2>

    <form id="authForm">
      <div class="field-group">
        <label class="field-label" for="email">E-Mail</label>
        <input type="email" id="email" autocomplete="email" required />
      </div>
      <div class="field-group">
        <label class="field-label" for="password">Passwort</label>
        <input type="password" id="password" autocomplete="current-password" minlength="6" required />
      </div>

      <div class="btn-row">
        <button class="primary" type="submit" id="submitBtn">Anmelden</button>
      </div>

      <div class="error-msg" id="errorMsg"></div>
      <div class="hint-msg" id="hintMsg"></div>
    </form>
  </div>

  <footer class="note">
    Dieses Logbuch hilft dir, eigene Gefühle besser zu verstehen. Bei akuten Krisen wende dich bitte an eine Person, der du vertraust, oder an eine Fachperson.
  </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
